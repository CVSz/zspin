<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>zspin Cloud Pricing</title>
  <style>
    body { font-family: Arial; background: #0b0b0b; color: #fff; }
    .container { max-width: 1000px; margin: auto; padding: 40px; }
    .card { border: 1px solid #333; padding: 20px; border-radius: 10px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Pricing</h1>
  <div class="grid">
    <div class="card"><h2>Free</h2><p>$0/month</p><ul><li>1M queries</li><li>100MB storage</li><li>10K vector ops</li></ul></div>
    <div class="card"><h2>Pro</h2><p>$49/month</p><ul><li>50M queries</li><li>10GB storage</li><li>1M vector ops</li></ul></div>
    <div class="card"><h2>Enterprise</h2><p>Custom</p><ul><li>Multi-region</li><li>Private cluster</li><li>SLA + support</li></ul></div>
  </div>
</div>
</body>
</html>
