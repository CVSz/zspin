version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: betting
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  backend:
    image: node:20
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run start:dev"
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - '3001:3001'
    depends_on:
      - backend

  admin-panel:
    image: node:20
    working_dir: /app
    volumes:
      - ./admin-panel:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - '3002:3002'
    depends_on:
      - backend
