apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zspin-app
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  source:
    repoURL: https://github.com/YOUR_ORG/zspin
    targetRevision: HEAD
    path: k8s
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
